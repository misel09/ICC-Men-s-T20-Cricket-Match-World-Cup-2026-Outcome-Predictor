version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: cricket_db
    restart: always
    environment:
      POSTGRES_DB: cricket_db
      POSTGRES_USER: cricket_user
      POSTGRES_PASSWORD: cricket_pass
    ports:
      - "5433:5432"
    volumes:
      - cricket_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql   # Auto-runs schema on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket_user -d cricket_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cricket_pgdata:
